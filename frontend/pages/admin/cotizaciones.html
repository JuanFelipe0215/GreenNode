<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenNode | Cotizaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles/dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="bi bi-tree"></i></div>
        <span class="sidebar-brand-name">GreenNode</span>
    </div>
    <ul class="sidebar-nav">
        <li><a href="/admin/dashboard"><i class="bi bi-grid"></i><span class="nav-label">Dashboard</span></a></li>
        <li class="active"><a href="/admin/cotizaciones"><i class="bi bi-file-text"></i><span class="nav-label">Cotizaciones</span></a></li>
        <li><a href="/admin/validacion"><i class="bi bi-shield-check"></i><span class="nav-label">Validación Humana</span></a></li>
        <li><a href="/admin/proyectos"><i class="bi bi-folder"></i><span class="nav-label">Proyectos</span></a></li>
        <li><a href="/admin/archivos"><i class="bi bi-archive"></i><span class="nav-label">Archivos</span></a></li>
    </ul>
    <div class="sidebar-footer">
        <button class="btn-logout-sidebar" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
            <span class="logout-label">Cerrar sesión</span>
        </button>
        <button class="collapse-btn" id="collapseBtn"><i class="bi bi-chevron-left"></i><span class="collapse-text">Colapsar</span></button>
    </div>
</aside>

<div class="main-wrapper" id="mainWrapper">
    <div class="topbar">
        <div class="topbar-company">
            <div class="company-avatar">AD</div>
            <span id="adminName">Administrador</span>
        </div>
        <div class="topbar-search"><input type="text" placeholder="Buscar cotización..." id="searchInput" /></div>
        <div class="topbar-actions">
            <button class="btn-logout-topbar" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
            <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()">AD
                <div class="user-dropdown" id="userDropdown">
                    <a href="#" class="logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
            <div>
                <div class="page-title">Cotizaciones (Preventa IA)</div>
                <div class="page-subtitle" id="quoteSubtitle">Cargando...</div>
            </div>
        </div>

        <div id="quotesList">
            <div class="empty-state"><i class="bi bi-hourglass"></i>Cargando cotizaciones...</div>
        </div>
    </div>
</div>

<script type="module">
import { apiGet, apiPatch, requireAuth, getStatusBadge, getStatusLabel, formatCOP, escHtml, initSidebar, logout as logoutFn } from "../../js/utils/api.js";

window.logout = logoutFn;

const user = requireAuth('admin');
initSidebar();

document.getElementById('adminName').textContent = user?.email || 'Admin';
document.getElementById('userAvatar').textContent = (user?.email || 'AD').substring(0,2).toUpperCase();

let allQuotes = [];

async function loadQuotes() {
    const res = await apiGet('/api/quotes');
    allQuotes = res?.data || [];
    renderQuotes(allQuotes);
    document.getElementById('quoteSubtitle').textContent = `${allQuotes.length} cotizaciones en total`;
}

function renderQuotes(quotes) {
    const container = document.getElementById('quotesList');
    if (quotes.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-file-earmark-x"></i>No hay cotizaciones aún.</div>';
        return;
    }
    container.innerHTML = quotes.map(q => `
        <div class="quote-card">
            <div class="quote-card-header">
                <div>
                    <div class="quote-card-meta">
                        <span style="color:var(--gn-muted);font-size:0.82rem;font-weight:600">GN-${String(q.id).padStart(4,'0')}</span>
                        <span class="badge-status ${getStatusBadge(q.status)}">${getStatusLabel(q.status)}</span>
                        <span class="ai-badge"><i class="bi bi-stars"></i> IA</span>
                    </div>
                    <div style="font-size:1rem;font-weight:700">${escHtml(q.title)}</div>
                    <div style="color:var(--gn-muted);font-size:0.83rem">${escHtml(q.company_name)} · ${escHtml(q.territory_city || '')}</div>
                </div>
                <div class="quote-card-amount">
                    ${formatCOP(q.quoted_amount)}
                    <small>${(q.tree_quantity || 0).toLocaleString()} árboles · ${escHtml(q.species_name || '')}</small>
                </div>
            </div>
            <div class="quote-card-footer">
                <div style="color:var(--gn-muted);font-size:0.82rem">
                    <i class="bi bi-clock"></i> ${new Date(q.created_at).toLocaleDateString('es-CO')} · ${getStatusLabel(q.status)}
                </div>
                <div style="display:flex;gap:0.5rem">
                    ${q.status === 'pending' || q.status === 'reviewed' ? `
                    <button class="btn-primary-gn" onclick="location.href='/admin/validacion?quoteId=${q.id}'">
                        Ver Marco Lógico <i class="bi bi-arrow-right"></i>
                    </button>` : ''}
                    ${q.status === 'reviewed' ? `
                    <button class="btn-outline-gn" onclick="sendQuote(${q.id})">
                        <i class="bi bi-send"></i> Enviar al cliente
                    </button>` : ''}
                </div>
            </div>
        </div>
    `).join('');
}

window.sendQuote = async function(id) {
    const result = await Swal.fire({
        title: '¿Enviar cotización al cliente?',
        text: 'El cliente podrá ver y aceptar o rechazar esta cotización.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#198754',
        confirmButtonText: 'Sí, enviar',
        cancelButtonText: 'Cancelar'
    });
    if (!result.isConfirmed) return;
    await apiPatch(`/api/quotes/${id}/status`, { status: 'sent' });
    Swal.fire({ icon: 'success', title: 'Cotización enviada', confirmButtonColor: '#198754' });
    loadQuotes();
};

document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderQuotes(allQuotes.filter(qt => qt.title?.toLowerCase().includes(q) || qt.company_name?.toLowerCase().includes(q)));
});

function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => { if (!e.target.closest('#userAvatar')) document.getElementById('userDropdown').classList.remove('show'); });

loadQuotes();
</script>
</body>
</html>
