<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenNode | Archivos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles/dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="bi bi-tree"></i></div>
        <span class="sidebar-brand-name">GreenNode</span>
    </div>
    <ul class="sidebar-nav">
        <li><a href="/admin/dashboard"><i class="bi bi-grid"></i><span class="nav-label">Dashboard</span></a></li>
        <li><a href="/admin/cotizaciones"><i class="bi bi-file-text"></i><span class="nav-label">Cotizaciones</span></a></li>
        <li><a href="/admin/validacion"><i class="bi bi-shield-check"></i><span class="nav-label">Validación Humana</span></a></li>
        <li><a href="/admin/proyectos"><i class="bi bi-folder"></i><span class="nav-label">Proyectos</span></a></li>
        <li class="active"><a href="/admin/archivos"><i class="bi bi-archive"></i><span class="nav-label">Archivos</span></a></li>
    </ul>
    <div class="sidebar-footer">
        <button class="btn-logout-sidebar" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
            <span class="logout-label">Cerrar sesión</span>
        </button>
        <button class="collapse-btn" id="collapseBtn"><i class="bi bi-chevron-left"></i><span class="collapse-text">Colapsar</span></button>
    </div>
</aside>
<div class="main-wrapper" id="mainWrapper">
    <div class="topbar">
        <div class="topbar-company"><div class="company-avatar">AD</div><span>Administrador</span></div>
        <div class="topbar-actions">
            <button class="btn-logout-topbar" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
            <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()">AD
                <div class="user-dropdown" id="userDropdown">
                    <a href="#" class="logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
                </div>
            </div>
        </div>
    </div>
    <div class="content">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
            <div>
                <div class="page-title">Repositorio de Archivos</div>
                <div class="page-subtitle">Documentos legales, certificados y reportes por proyecto</div>
            </div>
            <button class="btn-primary-gn" onclick="showAddFile()"><i class="bi bi-plus"></i> Añadir archivo</button>
        </div>
        <div class="card-panel">
            <div style="margin-bottom:1rem">
                <select id="projectFilter" class="form-control-gn" style="width:auto">
                    <option value="">Todos los proyectos</option>
                </select>
            </div>
            <table class="gn-table">
                <thead>
                    <tr>
                        <th>Archivo</th>
                        <th>Tipo</th>
                        <th>Proyecto</th>
                        <th>Subido por</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="filesTable">
                    <tr><td colspan="6" style="text-align:center;color:var(--gn-muted);padding:2rem">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
import { apiGet, apiPost, requireAuth, escHtml, initSidebar, logout as logoutFn } from "../../js/utils/api.js";
window.logout = logoutFn;
requireAuth('admin');
initSidebar();

const typeLabels = { legal_document: 'Documento Legal', certificate: 'Certificado', report: 'Reporte', other: 'Otro' };
let projects = [];
let allFiles = [];

async function load() {
    const pRes = await apiGet('/api/projects');
    projects = pRes?.data || [];
    
    const select = document.getElementById('projectFilter');
    projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `GN-${String(p.id).padStart(4,'0')} - ${p.name}`;
        select.appendChild(opt);
    });

    await loadFiles();
}

async function loadFiles(projectId = '') {
    if (projectId) {
        const res = await apiGet(`/api/files/${projectId}`);
        allFiles = (res?.data || []).map(f => ({ ...f, projectName: projects.find(p => p.id == projectId)?.name }));
    } else {
        const promises = projects.map(p => apiGet(`/api/files/${p.id}`).then(r => (r?.data||[]).map(f => ({...f, projectName: p.name}))));
        const results = await Promise.all(promises);
        allFiles = results.flat();
    }
    renderFiles(allFiles);
}

function renderFiles(files) {
    const tbody = document.getElementById('filesTable');
    if (!files.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--gn-muted);padding:2rem">No hay archivos.</td></tr>';
        return;
    }
    tbody.innerHTML = files.map(f => `
        <tr>
            <td style="font-weight:600;font-size:0.85rem"><i class="bi bi-file-earmark-pdf" style="color:#ef4444"></i> ${escHtml(f.file_url.split('/').pop() || f.file_url)}</td>
            <td>${typeLabels[f.file_type]||f.file_type}</td>
            <td>${escHtml(f.projectName||'—')}</td>
            <td>${escHtml(f.uploaded_by_email||'—')}</td>
            <td>${new Date(f.uploaded_at).toLocaleDateString('es-CO')}</td>
            <td><a href="${escHtml(f.file_url)}" target="_blank" class="btn-outline-gn" style="font-size:0.78rem"><i class="bi bi-download"></i></a></td>
        </tr>
    `).join('');
}

document.getElementById('projectFilter').addEventListener('change', (e) => loadFiles(e.target.value));

window.showAddFile = async function() {
    const opts = projects.map(p => `<option value="${p.id}">GN-${String(p.id).padStart(4,'0')} - ${escHtml(p.name)}</option>`).join('');
    const { value } = await Swal.fire({
        title: 'Añadir archivo',
        html: `
            <select id="fpId" class="swal2-select"><option value="">Selecciona proyecto</option>${opts}</select>
            <input id="fpUrl" class="swal2-input" placeholder="URL del archivo" />
            <select id="fpType" class="swal2-select">
                <option value="legal_document">Documento Legal</option>
                <option value="certificate">Certificado</option>
                <option value="report">Reporte</option>
                <option value="other">Otro</option>
            </select>
        `,
        confirmButtonColor: '#198754',
        confirmButtonText: 'Añadir',
        showCancelButton: true,
        preConfirm: () => ({
            project_id: document.getElementById('fpId').value,
            file_url: document.getElementById('fpUrl').value.trim(),
            file_type: document.getElementById('fpType').value
        })
    });
    if (!value?.project_id || !value?.file_url) return;
    await apiPost('/api/files', { project_id: parseInt(value.project_id), file_url: value.file_url, file_type: value.file_type });
    Swal.fire({ icon: 'success', title: 'Archivo añadido', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
    loadFiles(document.getElementById('projectFilter').value);
};

function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => { if (!e.target.closest('#userAvatar')) document.getElementById('userDropdown').classList.remove('show'); });

load();
</script>
</body>
</html>
